# HTTP — redirect all to HTTPS + serve certbot challenges
server {
    listen 80;
    server_name proof-forge.ru api.proof-forge.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — API
server {
    listen 443 ssl;
    server_name api.proof-forge.ru;

    ssl_certificate     /etc/letsencrypt/live/api.proof-forge.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.proof-forge.ru/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# HTTPS — root domain → simple landing (redirect to API docs for now)
server {
    listen 443 ssl;
    server_name proof-forge.ru;

    ssl_certificate     /etc/letsencrypt/live/proof-forge.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proof-forge.ru/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        return 302 https://api.proof-forge.ru/docs;
    }
}
