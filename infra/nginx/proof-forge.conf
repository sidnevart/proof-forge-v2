# ── HTTP ────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name proof-forge.ru api.proof-forge.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# app.proof-forge.ru — serves web app on HTTP
# HTTP works without SSL cert. To add HTTPS: run certbot for app.proof-forge.ru,
# then uncomment the HTTPS block at the bottom of this file.
server {
    listen 80;
    server_name app.proof-forge.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://web:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_read_timeout 60s;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name api.proof-forge.ru;

    ssl_certificate     /etc/letsencrypt/live/api.proof-forge.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.proof-forge.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    gzip on;
    gzip_types application/json text/plain;

    # Material uploads (PDFs, images) exceed nginx's 1 MB default, which would
    # 413 before reaching FastAPI — and a 413 from nginx carries no CORS header,
    # surfacing in the browser as a misleading CORS error. 30m leaves headroom
    # above the 25 MB per-file limit the frontend enforces (multipart overhead).
    client_max_body_size 30m;

    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    listen 443 ssl;
    server_name proof-forge.ru;

    ssl_certificate     /etc/letsencrypt/live/proof-forge.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proof-forge.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /var/www/proof-forge-landing;
    index index.html;

    gzip on;
    gzip_types text/plain text/html text/css application/javascript;

    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

