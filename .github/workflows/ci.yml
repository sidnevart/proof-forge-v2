name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: cd apps/backend && uv pip install --system -e ".[test]"

      - name: Run backend tests
        run: |
          cd apps/backend
          uv run pytest ../../tests/ -q --tb=short --ignore=../../tests/backend/docker
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          APP_ENV: test
          JWT_SECRET: test-secret-key
          LLM_API_KEY: ""
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: test-model

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Build web app
        run: cd apps/web && npm run build

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: cd apps/backend && uv pip install --system -e ".[test]"

      - name: Run integration tests
        run: |
          cd apps/backend
          uv run pytest ../../tests/backend/integration/ -q --tb=short -v --ignore=../../tests/backend/docker
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          APP_ENV: test
          JWT_SECRET: test-secret-key
          LLM_API_KEY: ""
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: test-model
