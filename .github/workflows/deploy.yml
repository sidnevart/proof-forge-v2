name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: cd apps/backend && uv pip install --system -e ".[test]"

      - name: Run backend tests
        run: |
          cd apps/backend
          uv run pytest ../../tests/ -q --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          APP_ENV: test
          JWT_SECRET: test-secret-key
          LLM_API_KEY: ""
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: test-model

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web app
        run: |
          cd apps/web
          npm ci
          npm run build

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR=/opt/proof-forge

            echo "==> Pulling latest code..."
            cd $APP_DIR
            git fetch origin main
            git reset --hard origin/main

            echo "==> Checking .env..."
            if [ ! -f "$APP_DIR/.env" ] || ! grep -q "POSTGRES_PASSWORD" "$APP_DIR/.env" 2>/dev/null; then
              echo "ERROR: $APP_DIR/.env is missing or invalid."
              echo "Set it up manually on the server, then redeploy."
              exit 1
            fi
            echo ".env OK ($(wc -l < $APP_DIR/.env) lines)"

            echo "==> Deploying landing page..."
            cp $APP_DIR/apps/landing/index.html /var/www/proof-forge-landing/index.html

            echo "==> Building and restarting services..."
            docker compose -f docker-compose.prod.yml build --parallel
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            echo "==> Waiting for backend..."
            for i in $(seq 1 25); do
              if curl -sf http://127.0.0.1:8002/health > /dev/null 2>&1; then
                echo "Backend healthy"
                break
              fi
              echo "Waiting... ($i/25)"
              sleep 4
            done

            echo "==> Health check..."
            curl -sf http://127.0.0.1:8002/health | grep -q '"status":"ok"'
            curl -sf -X OPTIONS http://127.0.0.1:8002/api/chat \
              -H "Origin: https://app.proof-forge.ru" \
              -H "Access-Control-Request-Method: POST" > /dev/null
            curl -sf http://127.0.0.1:3000 > /dev/null

            echo "==> Deploy complete!"
            docker compose -f docker-compose.prod.yml ps
