name: Diag Logs

# Manual-only: dumps recent backend logs so we can see WHY task generation
# degrades to templates (LLM call failure reason). No secrets are printed —
# the app never logs the API key.
on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch backend logs
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/proof-forge
            echo "===== OpenRouter direct probe (shows daily-vs-minute limit) ====="
            KEY=$(grep -E '^LLM_API_KEY=' .env | cut -d= -f2-)
            curl -s -D /tmp/h -o /tmp/b -X POST https://openrouter.ai/api/v1/chat/completions \
              -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" \
              -d '{"model":"moonshotai/kimi-k2.6:free","messages":[{"role":"user","content":"hi"}],"max_tokens":5}'
            echo "--- status + rate headers ---"
            grep -iE "^HTTP/|x-ratelimit|retry-after" /tmp/h || true
            echo "--- body (error message states the limit type) ---"
            cat /tmp/b | head -c 600 ; echo
            echo "===== /api/auth/key credits (OpenRouter account) ====="
            curl -s https://openrouter.ai/api/v1/auth/key -H "Authorization: Bearer $KEY" | head -c 400 ; echo
            echo "===== RAW last 80 backend log lines ====="
            docker compose -f docker-compose.prod.yml logs --tail 80 backend 2>&1 | tail -80 || true
            echo "===== TASK GENERATION lines ====="
            docker compose -f docker-compose.prod.yml logs --tail 4000 backend 2>&1 \
              | grep -iE "task (llm|json|generation)|salvage|using template" | tail -40 || true
            echo "===== 4xx/5xx / max_tokens / model errors ====="
            docker compose -f docker-compose.prod.yml logs --tail 4000 backend 2>&1 \
              | grep -iE "max_tokens|400 bad|status_code=4|status_code=5|httpstatuserror|invalid|unsupported|context length|too many tokens|reasoning" | tail -40 || true
            echo "===== effective LLM config (key NOT printed) ====="
            docker compose -f docker-compose.prod.yml exec -T backend sh -c 'echo MODEL=$LLM_MODEL ; echo BASE=$LLM_BASE_URL ; echo FALLBACK=$LLM_FALLBACK_MODEL' || true
