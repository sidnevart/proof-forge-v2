services:
  postgres_v2:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proofforge_v2}
      POSTGRES_USER: ${POSTGRES_USER:-pfv2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_v2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pfv2}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: production
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres_v2:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_v2_data:
